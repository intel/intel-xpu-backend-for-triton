name: Install benchmarks
description: Install benchmarks from pre-built wheel artifact with source build fallback

inputs:
  python-version:
    description: Python version for wheel artifact matching
    required: true
  github-token:
    description: GitHub token for artifact download
    required: true

runs:
  using: composite
  steps:
    - name: Detect benchmark source changes
      id: detect-source-changes
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        # If the branch modified benchmark sources relative to main, the prebuilt main
        # wheel would be stale, so we build from source instead of downloading it
        # (a same-run branch wheel, when present, is still preferred). Mirrors the
        # auto-detect in .github/actions/install-vllm.
        build_from_source=false
        # Capture first, then grep the string: avoids a SIGPIPE race where grep -q
        # exits on the first match and pipefail surfaces the killed gh process as a
        # failure (which would read as "no match").
        changed_files="$(gh api --paginate "repos/${{ github.repository }}/compare/main...${{ github.sha }}" --jq '.files[].filename')"
        if grep -qE '^benchmarks/' <<< "$changed_files"; then
          build_from_source=true
        fi
        echo "build-from-source=$build_from_source" | tee -a "$GITHUB_OUTPUT"

    - name: Download benchmarks wheel (same run)
      id: same-run-download
      uses: actions/download-artifact@v7
      continue-on-error: true
      with:
        name: benchmarks-wheel-py${{ inputs.python-version }}
        path: ${{ runner.temp }}/benchmarks-wheel-same-run

    - name: Install benchmarks wheel (same run)
      id: same-run-install
      if: steps.same-run-download.outcome == 'success'
      continue-on-error: true
      shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
      run: |
        # Uninstall first to ensure clean install. We can't use --force-reinstall
        # because it would reinstall torch and clobber the XPU-specific PyTorch build.
        # Plain pip install won't upgrade because the wheel uses a PEP 440 local
        # version (3.7.2+git...) and pip treats different local suffixes as the same.
        pip uninstall -y triton-kernels-benchmark 2>/dev/null || true
        cd "$RUNNER_TEMP/benchmarks-wheel-same-run"
        pip install *.whl

    - name: Validate benchmarks (same run)
      id: same-run-validate
      if: steps.same-run-install.outcome == 'success'
      shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
      run: triton-benchmarks describe ALL
      continue-on-error: true

    - name: Install triton-utils
      # Skip the main wheel entirely when the branch changed benchmark sources: it would
      # be stale, so we go straight to the source build below.
      if: steps.same-run-validate.outcome != 'success' && steps.detect-source-changes.outputs.build-from-source != 'true'
      shell: bash
      run: pip install "$GITHUB_WORKSPACE/scripts/triton_utils"

    - name: Download and install benchmarks wheel (main)
      id: main-wheel
      if: steps.same-run-validate.outcome != 'success' && steps.detect-source-changes.outputs.build-from-source != 'true'
      continue-on-error: true
      shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        # $RUNNER_TEMP is auto-cleaned per job — avoids stale wheels on self-hosted runners.
        triton-utils wheels \
          --latest-wf-run benchmarks \
          --wheel-set bench \
          --python-version "${{ inputs.python-version }}" \
          -D "$RUNNER_TEMP/benchmarks-wheel" \
          -R "$GITHUB_REPOSITORY"

        # See "Install benchmarks wheel (same run)" step for why uninstall-then-install.
        pip uninstall -y triton-kernels-benchmark 2>/dev/null || true
        cd "$RUNNER_TEMP/benchmarks-wheel"/*
        pip install *.whl

    - name: Validate benchmarks (main)
      id: main-validate
      if: steps.main-wheel.outcome == 'success'
      shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
      run: triton-benchmarks describe ALL
      continue-on-error: true

    - name: Report wheel installation success
      if: steps.same-run-validate.outcome == 'success' || steps.main-validate.outcome == 'success'
      shell: bash
      run: |
        if [[ "${{ steps.same-run-validate.outcome }}" == "success" ]]; then
          echo "::notice::Installed benchmarks from same-run wheel artifact"
        else
          echo "::notice::Installed benchmarks from main branch wheel artifact"
        fi

    - name: Build benchmarks from source
      # Runs when no usable wheel was installed. Two ways to get here:
      #   - the branch changed benchmark sources (build-from-source == true), so the
      #     main wheel was skipped above — this is the expected path, not a fallback;
      #   - the branch didn't change benchmarks but neither wheel was available.
      # No continue-on-error: a failed build fails the job loudly rather than silently
      # running stale/absent benchmarks.
      if: steps.same-run-validate.outcome != 'success' && steps.main-validate.outcome != 'success'
      shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
      run: |
        if [[ "${{ steps.detect-source-changes.outputs.build-from-source }}" == "true" ]]; then
          echo "::notice::Branch modified benchmark sources; building from source"
        else
          echo "::warning::Pre-built wheel unavailable, falling back to source build"
        fi
        pip uninstall -y triton-kernels-benchmark 2>/dev/null || true
        (cd "$GITHUB_WORKSPACE/benchmarks" && pip install --no-build-isolation .)
