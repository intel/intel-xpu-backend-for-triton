name: Benchmark regression detection

on:
  workflow_run:
    workflows:
      - "Triton benchmarks, PVC"
      - "Triton benchmarks, BMG"
      - "Triton benchmarks"
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  detect-regressions:
    name: Detect regressions
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout benchmark-data branch
        id: checkout-data
        uses: actions/checkout@v6
        with:
          ref: benchmark-data
          path: benchmark-data
        continue-on-error: true

      - name: Initialize benchmark-data if needed
        if: steps.checkout-data.outcome == 'failure'
        run: |
          mkdir -p benchmark-data
          cd benchmark-data
          git init
          git checkout -b benchmark-data

      - name: Download benchmark reports from triggering run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          echo "Downloading artifacts from triggering run $RUN_ID..."
          if ! gh run download "$RUN_ID" --repo "${{ github.repository }}" --name benchmark-reports --dir reports; then
            echo "No benchmark-reports artifact found for run $RUN_ID. Exiting."
            exit 0
          fi

      - name: Read benchmark metadata
        id: meta
        run: |
          if [ ! -f reports/metadata.json ]; then
            echo "::error::No metadata.json found in benchmark-reports artifact."
            exit 1
          fi
          TAG=$(jq -r '.tag' reports/metadata.json)
          RUNNER_LABEL=$(jq -r '.runner_label' reports/metadata.json)
          COMMIT_SHA=$(jq -r '.commit_sha' reports/metadata.json)
          PR_NUMBER=$(jq -r '.pr_number' reports/metadata.json)
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "RUNNER_LABEL=$RUNNER_LABEL" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=$COMMIT_SHA" >> "$GITHUB_ENV"
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          echo "Metadata: tag=$TAG runner_label=$RUNNER_LABEL commit=$COMMIT_SHA pr=$PR_NUMBER"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas pyyaml

      - name: Convert results to history format
        run: |
          python scripts/benchmark-monitor/convert_results.py \
            --reports-dir reports \
            --history-dir benchmark-data \
            --tag "$TAG" \
            --run-id "${{ github.event.workflow_run.id }}" \
            --commit-sha "$COMMIT_SHA"

      - name: Detect regressions
        id: detect
        continue-on-error: true
        run: |
          python scripts/benchmark-monitor/detect_regressions.py \
            --history-dir benchmark-data \
            --runner-label "$RUNNER_LABEL" \
            --output reports/regression-report.json \
            --config scripts/benchmark-monitor/thresholds.yaml

      - name: Report results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/benchmark-monitor/report_results.py \
            --report reports/regression-report.json \
            --tag "$TAG" \
            --pr-number "$PR_NUMBER" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" \
            --repo "${{ github.repository }}"

      - name: Push updated history to benchmark-data branch
        if: env.TAG == 'ci'
        run: |
          cd benchmark-data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update benchmark history (run ${{ github.event.workflow_run.id }})"

          # Retry push with rebase to handle concurrent updates
          for attempt in 1 2 3 4 5; do
            if git push origin benchmark-data; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push failed (attempt $attempt/5). Rebasing and retrying..."
            sleep $((attempt * 2))
            git fetch origin benchmark-data
            git rebase origin/benchmark-data
          done
          echo "ERROR: Push failed after 5 attempts."
          exit 1
