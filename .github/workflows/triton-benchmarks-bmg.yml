name: Triton benchmarks, BMG

permissions: read-all

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled]

jobs:
  check-paths:
    runs-on: ubuntu-latest
    outputs:
      benchmarks: ${{ steps.check.outputs.benchmarks }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for benchmark changes
        id: check
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^(\.github/workflows/triton-benchmarks.*\.yml|benchmarks/)' || true)
          if [ -n "$CHANGED" ]; then
            echo "benchmarks=true" >> $GITHUB_OUTPUT
          else
            echo "benchmarks=false" >> $GITHUB_OUTPUT
          fi

  benchmarks:
    needs: check-paths
    if: needs.check-paths.outputs.benchmarks == 'true' || github.event.label.name == 'run-benchmarks'
    uses: ./.github/workflows/triton-benchmarks.yml
    with:
      runner_label: b580
      skip_benchmarks: "['flex_attention_benchmark_batch16-causal_mask.py']"
