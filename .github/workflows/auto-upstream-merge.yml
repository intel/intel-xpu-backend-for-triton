# Automate upstream Triton merge
#
# Merges new commits from triton-lang/triton into the Intel XPU backend fork.
# Runs daily (23:30 UTC) or on manual trigger with an optional target hash.
#
# Pipeline: merge → build → pre-commit → unit tests → update tracking file → PR
#
# - Clean merge + all checks pass → normal PR with auto-merge enabled
# - Clean merge + any check fails → draft PR with failure reason
# - Merge conflicts → draft PR listing conflicting files, assigned to Whitney
#
# The tracking file (upstream-triton-hash.txt) is ONLY updated when all checks
# pass, so the workflow retries the same merge on next run if anything failed.
#
# For local testing of the merge step only, see: scripts/auto-upstream-merge.sh

name: Automate upstream Triton merge

on:
  workflow_dispatch:
    inputs:
      target_hash:
        description: >
          Upstream triton-lang/triton commit hash to merge.
          Leave empty to merge the latest commit on upstream main.
        required: false
        type: string
  schedule:
    # Run daily at 23:30 UTC (after the translator-cid bot at 23:05)
    - cron: '30 23 * * *'

permissions: read-all

concurrency:
  group: upstream-merge
  cancel-in-progress: false

env:
  PR_BRANCH: bot/upstream-merge
  UPSTREAM_REPO: https://github.com/triton-lang/triton.git

jobs:
  upstream-merge:
    runs-on:
      - max1100
      - rolling
      - runner-0.0.22
    defaults:
      run:
        shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
    steps:
      # ------------------------------------------------------------------
      # 1. Checkout with full history (needed for merge)
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}

      # ------------------------------------------------------------------
      # 2. Guard: skip if a bot/upstream-merge PR is already open
      # ------------------------------------------------------------------
      - name: Check for existing open PR
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          PRID=$(gh pr list --search "head:${PR_BRANCH}" --state open --json number --jq '.[0].number')
          if [[ -n "${PRID}" ]]; then
            echo "TARGET_PRID=${PRID}" >> "$GITHUB_ENV"
            echo "::notice::Skipping — open PR #${PRID} exists on ${PR_BRANCH}"
          fi

      # ------------------------------------------------------------------
      # 3. Setup git identity and rerere
      # ------------------------------------------------------------------
      - name: Configure git
        if: ${{ env.TARGET_PRID == null }}
        run: |
          git config --global user.name 'glados-intel'
          git config --global user.email 'glados@intel.com'
          git config rerere.enabled true
          git config rerere.autoupdate true

      # ------------------------------------------------------------------
      # 4. Fetch upstream and determine target
      # ------------------------------------------------------------------
      - name: Fetch upstream
        if: ${{ env.TARGET_PRID == null }}
        run: |
          git remote add upstream-triton "${UPSTREAM_REPO}" 2>/dev/null || true
          git fetch upstream-triton main --quiet

          CURRENT_HASH=$(tr -d '[:space:]' < upstream-triton-hash.txt)
          echo "CURRENT_HASH=${CURRENT_HASH}" >> "$GITHUB_ENV"

          if [[ -n "${{ inputs.target_hash }}" ]]; then
            TARGET_HASH="${{ inputs.target_hash }}"
          else
            TARGET_HASH=$(git rev-parse upstream-triton/main)
          fi
          TARGET_SHORT="${TARGET_HASH:0:7}"

          # Validate that the target hash exists in the fetched history
          if ! git cat-file -e "${TARGET_HASH}" 2>/dev/null; then
            echo "::error::Target hash ${TARGET_HASH} not found in upstream"
            exit 1
          fi

          echo "TARGET_HASH=${TARGET_HASH}" >> "$GITHUB_ENV"
          echo "TARGET_SHORT=${TARGET_SHORT}" >> "$GITHUB_ENV"
          echo "::notice::Current base: ${CURRENT_HASH:0:7} → Target: ${TARGET_SHORT}"

      # ------------------------------------------------------------------
      # 5. Check if there are new commits
      # ------------------------------------------------------------------
      - name: Check for new commits
        if: ${{ env.TARGET_PRID == null }}
        run: |
          if [[ "${CURRENT_HASH}" == "${TARGET_HASH}" ]]; then
            echo "Already up to date with upstream (${TARGET_SHORT})."
            echo "UP_TO_DATE=true" >> "$GITHUB_ENV"
          else
            COUNT=$(git rev-list "${CURRENT_HASH}..${TARGET_HASH}" --count 2>/dev/null || echo "?")
            echo "::notice::${COUNT} new upstream commit(s) to merge"
          fi

      # ------------------------------------------------------------------
      # 6. Create merge branch and attempt merge
      # ------------------------------------------------------------------
      - name: Prepare merge branch
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' }}
        run: |
          # Delete stale remote branch if it exists
          if git show-ref --verify --quiet "refs/remotes/origin/${PR_BRANCH}"; then
            echo "Deleting stale remote branch ${PR_BRANCH}..."
            git push origin --delete "${PR_BRANCH}" || true
          fi
          git checkout -b "${PR_BRANCH}"

      - name: Attempt merge
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' }}
        run: |
          echo "Attempting merge of ${TARGET_SHORT}..."
          if git merge "${TARGET_HASH}" --no-edit; then
            echo "MERGE_CLEAN=true" >> "$GITHUB_ENV"
            echo "::notice::Merge succeeded cleanly"
          else
            echo "MERGE_CLEAN=false" >> "$GITHUB_ENV"
            # Collect conflict info
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U 2>/dev/null || true)
            CONFLICT_COUNT=$(echo "${CONFLICT_FILES}" | grep -c '.' || echo 0)
            echo "CONFLICT_COUNT=${CONFLICT_COUNT}" >> "$GITHUB_ENV"

            # Store conflict files in a multi-line env var
            EOF_DELIM="EOF_$(date +%s%N)"
            {
              echo "CONFLICT_FILES<<${EOF_DELIM}"
              echo "${CONFLICT_FILES}"
              echo "${EOF_DELIM}"
            } >> "$GITHUB_ENV"

            echo "::warning::Merge has ${CONFLICT_COUNT} conflicting file(s)"
            echo "${CONFLICT_FILES}" | sed 's/^/  - /'
          fi

      # ------------------------------------------------------------------
      # 7. Build check (clean merges only)
      # ------------------------------------------------------------------
      - name: Load pip cache
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.MERGE_CLEAN == 'true' }}
        uses: ./.github/actions/load
        env:
          CACHE_NUMBER: 1
        with:
          path: $HOME/.cache/pip
          key: pip-3.10-${{ hashFiles('pyproject.toml', 'setup.py') }}-${{ env.CACHE_NUMBER }}

      - name: Install Python 3.10
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.MERGE_CLEAN == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Setup PyTorch
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.MERGE_CLEAN == 'true' }}
        uses: ./.github/actions/setup-pytorch

      - name: Setup Triton
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.MERGE_CLEAN == 'true' }}
        uses: ./.github/actions/setup-triton

      - name: Build check
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.MERGE_CLEAN == 'true' }}
        timeout-minutes: 60
        run: |
          echo "Running build check..."
          BUILD_LOG_FILE=$(mktemp)
          if scripts/compile-triton.sh --triton 2>&1 | tee "${BUILD_LOG_FILE}"; then
            echo "BUILD_OK=true" >> "$GITHUB_ENV"
            echo "::notice::Build succeeded"
          else
            echo "BUILD_OK=false" >> "$GITHUB_ENV"
            echo "::warning::Build failed"
            # Capture last 50 lines for PR body
            EOF_DELIM="EOF_$(date +%s%N)"
            {
              echo "BUILD_LOG<<${EOF_DELIM}"
              tail -50 "${BUILD_LOG_FILE}"
              echo "${EOF_DELIM}"
            } >> "$GITHUB_ENV"
          fi
          rm -f "${BUILD_LOG_FILE}"

      # ------------------------------------------------------------------
      # 8. Pre-commit check (clean merges + build passed only)
      # ------------------------------------------------------------------
      - name: Pre-commit check
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.MERGE_CLEAN == 'true' && env.BUILD_OK == 'true' }}
        timeout-minutes: 15
        run: |
          echo "Running pre-commit checks..."
          pip install pre-commit
          PRECOMMIT_LOG_FILE=$(mktemp)
          if python3 -m pre_commit run --show-diff-on-failure --color=always --all-files 2>&1 | tee "${PRECOMMIT_LOG_FILE}"; then
            echo "PRECOMMIT_OK=true" >> "$GITHUB_ENV"
            echo "::notice::Pre-commit passed"
          else
            echo "PRECOMMIT_OK=false" >> "$GITHUB_ENV"
            echo "::warning::Pre-commit failed"
            EOF_DELIM="EOF_$(date +%s%N)"
            {
              echo "PRECOMMIT_LOG<<${EOF_DELIM}"
              tail -50 "${PRECOMMIT_LOG_FILE}"
              echo "${EOF_DELIM}"
            } >> "$GITHUB_ENV"
          fi
          rm -f "${PRECOMMIT_LOG_FILE}"

      # ------------------------------------------------------------------
      # 9. Unit tests (clean merges + build + pre-commit passed only)
      # ------------------------------------------------------------------
      - name: Run unit tests
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.MERGE_CLEAN == 'true' && env.BUILD_OK == 'true' && env.PRECOMMIT_OK == 'true' }}
        timeout-minutes: 45
        run: |
          echo "Running unit tests (ctest + lit)..."
          TESTS_LOG_FILE=$(mktemp)
          if scripts/test-triton.sh --unit 2>&1 | tee "${TESTS_LOG_FILE}"; then
            echo "TESTS_OK=true" >> "$GITHUB_ENV"
            echo "::notice::Unit tests passed"
          else
            echo "TESTS_OK=false" >> "$GITHUB_ENV"
            echo "::warning::Unit tests failed"
            EOF_DELIM="EOF_$(date +%s%N)"
            {
              echo "TESTS_LOG<<${EOF_DELIM}"
              tail -50 "${TESTS_LOG_FILE}"
              echo "${EOF_DELIM}"
            } >> "$GITHUB_ENV"
          fi
          rm -f "${TESTS_LOG_FILE}"

      # ------------------------------------------------------------------
      # 10. Update tracking file (only when ALL checks pass)
      # ------------------------------------------------------------------
      - name: Update tracking file
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.MERGE_CLEAN == 'true' && env.BUILD_OK == 'true' && env.PRECOMMIT_OK == 'true' && env.TESTS_OK == 'true' }}
        run: |
          echo "${TARGET_HASH}" > upstream-triton-hash.txt
          git add upstream-triton-hash.txt
          git commit --amend --no-edit

      # ------------------------------------------------------------------
      # 11. Clean build artifacts before push
      # ------------------------------------------------------------------
      - name: Clean build artifacts
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.MERGE_CLEAN == 'true' }}
        run: |
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true

      # ------------------------------------------------------------------
      # 12. Push and create PR
      # ------------------------------------------------------------------
      - name: Push merge branch
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' }}
        run: |
          # For conflict merges, create a WIP commit that includes cleanly-
          # merged files so the PR diff shows what's coming from upstream.
          # Conflicting files are NOT staged to avoid baking conflict markers
          # into the repo.
          if [[ "${MERGE_CLEAN}" != "true" ]]; then
            git merge --abort
            git merge "${TARGET_HASH}" --no-commit --no-edit || true
            # Stage only non-conflicting files; skip files with markers
            CONFLICTED=$(git diff --name-only --diff-filter=U 2>/dev/null || true)
            git add -A 2>/dev/null || true
            if [[ -n "${CONFLICTED}" ]]; then
              echo "${CONFLICTED}" | xargs -r git reset HEAD -- 2>/dev/null || true
              echo "Skipped conflicting files:"
              echo "${CONFLICTED}" | sed 's/^/  - /'
            fi
            git commit --no-verify -m "WIP: Merge upstream ${TARGET_SHORT} (conflicts)" || true
          fi
          git push origin "${PR_BRANCH}" --force-with-lease

      - name: Create pull request
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          MERGE_DATE=$(date +'%b %-d')
          PR_TITLE="Merge OpenAI Triton commit \`${TARGET_SHORT}\`"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Determine if PR should be a draft and build failure details
          IS_DRAFT="false"
          DRAFT_FLAG=""
          EXTRA_BODY=""
          FAILURE_REASON=""

          if [[ "${MERGE_CLEAN}" != "true" ]]; then
            IS_DRAFT="true"
            DRAFT_FLAG="--draft"
            FAILURE_REASON="Merge conflicts"
            EXTRA_BODY="
          > **Merge conflicts detected** (${CONFLICT_COUNT} file(s)):
          $(echo "${CONFLICT_FILES}" | sed 's/^/> - `/' | sed 's/$/`/')
          >
          > Manual resolution required — assigned to @whitneywhtsang."
          elif [[ "${BUILD_OK:-}" != "true" ]]; then
            IS_DRAFT="true"
            DRAFT_FLAG="--draft"
            FAILURE_REASON="Build failed"
            EXTRA_BODY="
          > **Build failed.** Please investigate before merging.
          >
          > [View workflow run](${RUN_URL})

          <details><summary>Build log (last 50 lines)</summary>

          \`\`\`
          ${BUILD_LOG:-No log captured}
          \`\`\`

          </details>"
          elif [[ "${PRECOMMIT_OK:-}" != "true" ]]; then
            IS_DRAFT="true"
            DRAFT_FLAG="--draft"
            FAILURE_REASON="Pre-commit failed"
            EXTRA_BODY="
          > **Pre-commit checks failed.** Please investigate before merging.
          >
          > [View workflow run](${RUN_URL})

          <details><summary>Pre-commit log (last 50 lines)</summary>

          \`\`\`
          ${PRECOMMIT_LOG:-No log captured}
          \`\`\`

          </details>"
          elif [[ "${TESTS_OK:-}" != "true" ]]; then
            IS_DRAFT="true"
            DRAFT_FLAG="--draft"
            FAILURE_REASON="Unit tests failed"
            EXTRA_BODY="
          > **Unit tests failed.** Please investigate before merging.
          >
          > [View workflow run](${RUN_URL})

          <details><summary>Test log (last 50 lines)</summary>

          \`\`\`
          ${TESTS_LOG:-No log captured}
          \`\`\`

          </details>"
          fi

          PR_BODY="$(cat <<PREOF
          This PR changes the Triton base from
          ${CURRENT_HASH} to
          ${TARGET_HASH} (${MERGE_DATE}).

          *Pass rate will be determined by CI.*
          ${EXTRA_BODY}

          ---
          *Automated by \`auto-upstream-merge\` workflow.*
          PREOF
          )"

          gh pr create \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}" \
            --head "${PR_BRANCH}" \
            --base main \
            --reviewer whitneywhtsang \
            ${DRAFT_FLAG}

          # Export for Teams notification
          echo "IS_DRAFT=${IS_DRAFT}" >> "$GITHUB_ENV"
          echo "FAILURE_REASON=${FAILURE_REASON}" >> "$GITHUB_ENV"
          PR_URL=$(gh pr list --search "head:${PR_BRANCH}" --state open --json url --jq '.[0].url')
          echo "PR_URL=${PR_URL}" >> "$GITHUB_ENV"

          echo "::notice::PR created (draft=${IS_DRAFT})"

      # ------------------------------------------------------------------
      # 13. Notify MS Teams on failure (draft PRs only)
      # ------------------------------------------------------------------
      - name: Notify MS Teams
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.IS_DRAFT == 'true' && secrets.TEAMS_WEBHOOK_URL != '' }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(cat <<'CARD'
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "TextBlock",
                      "size": "Medium",
                      "weight": "Bolder",
                      "text": "⚠️ Upstream merge needs attention"
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        { "title": "Failure:", "value": "FAILURE_PLACEHOLDER" },
                        { "title": "Target:", "value": "TARGET_PLACEHOLDER" },
                        { "title": "PR:", "value": "PR_PLACEHOLDER" },
                        { "title": "Logs:", "value": "RUN_PLACEHOLDER" }
                      ]
                    }
                  ]
                }
              }
            ]
          }
          CARD
          )

          # Substitute placeholders
          PAYLOAD="${PAYLOAD//FAILURE_PLACEHOLDER/${FAILURE_REASON}}"
          PAYLOAD="${PAYLOAD//TARGET_PLACEHOLDER/${TARGET_SHORT}}"
          PAYLOAD="${PAYLOAD//PR_PLACEHOLDER/${PR_URL}}"
          PAYLOAD="${PAYLOAD//RUN_PLACEHOLDER/${RUN_URL}}"

          curl -sS -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${{ secrets.TEAMS_WEBHOOK_URL }}" || echo "::warning::Failed to send Teams notification"

      # ------------------------------------------------------------------
      # 14. Enable auto-merge (only when ALL checks pass)
      # ------------------------------------------------------------------
      - name: Enable auto-merge
        if: ${{ env.TARGET_PRID == null && env.UP_TO_DATE != 'true' && env.MERGE_CLEAN == 'true' && env.BUILD_OK == 'true' && env.PRECOMMIT_OK == 'true' && env.TESTS_OK == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --search "head:${PR_BRANCH}" --state open --json number --jq '.[0].number')
          if [[ -n "${PR_NUMBER}" ]]; then
            gh pr merge "${PR_NUMBER}" --auto --merge || echo "::warning::Could not enable auto-merge (may need branch protection rules)"
          fi
