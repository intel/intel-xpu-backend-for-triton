name: Third party benchmarks

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Runner label, keep empty for default
        type: string
        default: ""
      tag:
        description: Tag for benchmark results
        type: string
        default: "test"
      benchmarks:
        description: JSON list of benchmarks to run. Leave empty to run all benchmarks.
        type: string
        default: ""
      sglang_pin:
        description: SGLang pin (commit hash), keep empty for default
        type: string
        default: ""
  # This workflow is also called from workflows third-party-benchmarks-*.yml.
  workflow_call:
    inputs:
      runner_label:
        description: Runner label
        type: string
      benchmarks:
        description: JSON list of benchmarks to run. Leave empty to run all benchmarks.
        type: string
        default: ""
      sglang_pin:
        description: SGLang pin (commit hash), keep empty for default
        type: string
        default: ""

  schedule:
    - cron: "0 9 * * *"

permissions: read-all

env:
  PYTHON_VERSION: "3.12"
  TAG: ${{ inputs.tag || (github.event_name == 'pull_request' && format('pr-{0}', github.event.number)) || (github.event_name == 'schedule' && 'ci') || 'test' }}
  HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}

jobs:
  build:
    name: Third party benchmarks
    runs-on:
      - linux
      - ${{ inputs.runner_label || 'max1550' }}
    timeout-minutes: 720
    defaults:
      run:
        shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
    steps:
      - name: Print inputs
        run: |
          cat <<EOF
          ${{ toJSON(inputs) }}
          EOF

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Override SGLang pin
        if: ${{ inputs.sglang_pin }}
        run: |
          echo "${{ inputs.sglang_pin }}" > benchmarks/third_party/sglang/sglang-pin.txt
          echo "Overriding SGLang pin to: ${{ inputs.sglang_pin }}"

      - name: Install Python (from pyenv) ${{ inputs.python_version }}
        uses: ./.github/actions/setup-pyenv-python
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Identify Python version
        run: |
          PYTHON_VERSION="$(python -c 'import sys; print(f"{sys.version_info[0]}.{ sys.version_info[1]}")')"
          echo "PYTHON_VERSION=$PYTHON_VERSION" | tee -a $GITHUB_ENV

      - name: Install Python build dependencies
        run: |
          pip install cmake

      - name: Setup PyTorch
        uses: ./.github/actions/setup-pytorch

      - name: Setup Triton
        uses: ./.github/actions/setup-triton

      - name: Create reports dir
        run: |
          mkdir reports
          echo "REPORTS=$PWD/reports" >> $GITHUB_ENV

      - name: Install benchmark dependencies
        id: install
        run: |
          pip install transformers 'pandas<3.0' pytest

      - name: Install benchmarks
        id: install-benchmarks
        run: |
          cd benchmarks
          # --no-build-isolation is necessary after moving to python=3.12
          pip install --no-build-isolation .

      - name: Run Liger-Kernel benchmarks
        if: ${{ steps.install.outcome == 'success' && !cancelled() && (inputs.benchmarks == '' || contains(fromJson(inputs.benchmarks || '[]'), 'liger')) }}
        run: |
          source ./scripts/capture-hw-details.sh

          ./scripts/test-triton.sh --install-liger --skip-pip-install --skip-pytorch-install

          # To remember return code, but still copy results
          RET_CODE=0
          bash benchmarks/third_party/liger/run_benchmarks.sh || RET_CODE=$?

          cp Liger-Kernel/benchmark/data/all_benchmark_data.csv $REPORTS/liger-raw.csv
          python benchmarks/third_party/liger/transform.py \
            $REPORTS/liger-raw.csv \
            $REPORTS/liger-report.csv \
            --tag $TAG

          # Return the captured return code at the end
          exit "$RET_CODE"

      - name: Upload benchmark reports
        if: ${{ steps.install.outcome == 'success' && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-reports
          path: reports
