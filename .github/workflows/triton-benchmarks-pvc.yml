name: Triton benchmarks, PVC

permissions: read-all

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled]

jobs:
  guard:
    name: Check benchmark trigger
    runs-on: Linux
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check trigger conditions
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          API_URL: ${{ github.api_url }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Run benchmarks if the run-benchmarks label was just added.
          if [[ "$EVENT_ACTION" == "labeled" ]]; then
            if [[ "$LABEL_NAME" == "run-benchmarks" ]]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          # For non-label events, check if benchmark-related files changed.
          RESPONSE=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            "${API_URL}/repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" 2>&1) || {
            echo "::warning::Failed to fetch PR file list from GitHub API"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          MATCH=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              files = [f['filename'] for f in json.load(sys.stdin)]
              print('true' if any(
                  f.startswith('to-be-reverted/.github/workflows/triton-benchmarks') or f.startswith('to-be-reverted/benchmarks/')
                  for f in files
              ) else 'false')
          except Exception:
              print('false')
          ")
          echo "should_run=$MATCH" >> "$GITHUB_OUTPUT"

  benchmarks:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    uses: ./.github/workflows/triton-benchmarks.yml
    with:
      runner_label: max1550
      skip_benchmarks: "[]"
