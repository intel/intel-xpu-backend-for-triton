name: vLLM tests reusable workflow

on:
  workflow_call:
    inputs:
      runner_label:
        description: Runner label, keep empty for default
        type: string
        default: ""
      vllm_pin:
        description: vLLM pin (commit hash), keep empty for default
        type: string
        default: ""
      skip_list:
        description: Skip list directory override
        type: string
        default: ""
      python_version:
        description: Python version
        type: string
        default: "3.12"
      ignore_errors:
        description: Ignore test errors
        type: boolean
        default: false
      use_pyenv_python:
        description: Use Python built with pyenv
        type: boolean
        default: true

permissions: read-all

env:
  PYTHON_VERSION: ${{ inputs.python_version }}
  # Increase this value to reset cache
  PIP_CACHE_NUMBER: 1
  HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}

jobs:
  setup:
    name: Setup
    runs-on:
      - linux
      - ${{ inputs.runner_label || 'max1550' }}
    timeout-minutes: 60
    defaults:
      run:
        shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
    outputs:
      test-triton-command: ${{ steps.test-triton.outputs.command }}
    steps:
      - name: Print inputs
        run: |
          cat <<EOF
          ${{ toJSON(inputs) }}
          EOF

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Load pip cache
        id: pip-cache
        uses: ./.github/actions/load
        with:
          path: $HOME/.cache/pip
          key: pip-${{ inputs.python_version }}-${{ hashFiles('pyproject.toml', 'setup.py') }}-${{ env.PIP_CACHE_NUMBER }}

      - name: Install Python
        uses: ./.github/actions/setup-python
        with:
          python_version: ${{ inputs.python_version }}
          use_pyenv: ${{ inputs.use_pyenv_python }}

      - name: Identify Python version
        run: |
          PYTHON_VERSION="$(python -c 'import sys; print(f"{sys.version_info[0]}.{ sys.version_info[1]}")')"
          echo "PYTHON_VERSION=$PYTHON_VERSION" | tee -a $GITHUB_ENV

      - name: Install Python build dependencies
        run: |
          pip install cmake
          pip install -r python/requirements.txt

      - name: Setup PyTorch
        uses: ./.github/actions/setup-pytorch

      - name: Build Triton wheel
        run: |
          python -m build --wheel --no-isolation
          ls -lh dist/*.whl

      - name: Upload Triton wheel
        uses: actions/upload-artifact@v7
        with:
          name: triton-vllm-${{ inputs.python_version }}
          path: dist/*.whl

      - name: Install Triton from wheel
        run: |
          pip install dist/*.whl

      - name: Set test-triton command line
        id: test-triton
        run: |
          skiplist="$GITHUB_WORKSPACE/scripts/skiplist/default"
          if [[ -n "${{ inputs.skip_list }}" ]]; then
            skiplist="$GITHUB_WORKSPACE/scripts/skiplist/${{ inputs.skip_list }}"
          fi
          TRITON_TEST_CMD="bash -x scripts/test-triton.sh --skip-pip-install --skip-pytorch-install --reports-dir $GITHUB_WORKSPACE/reports --skip-list $skiplist ${{ inputs.ignore_errors && '--ignore-errors' || '' }}"
          echo "command=$TRITON_TEST_CMD" | tee -a $GITHUB_OUTPUT

      - name: Install test dependencies
        run: |
          pip install -r scripts/requirements-test.txt

      - name: Install vLLM
        env:
          VLLM_PIN: ${{ inputs.vllm_pin }}
        run: |
          ${{ steps.test-triton.outputs.command }} --install-vllm

      - name: Freeze vLLM dependencies
        run: |
          pip freeze > vllm-requirements.txt

      - name: Save pip cache
        if: ${{ steps.pip-cache.outputs.status == 'miss' }}
        uses: ./.github/actions/save
        with:
          path: ${{ steps.pip-cache.outputs.path }}
          dest: ${{ steps.pip-cache.outputs.dest }}

      - name: Upload vLLM requirements
        uses: actions/upload-artifact@v7
        with:
          name: vllm-requirements-${{ inputs.python_version }}
          path: vllm-requirements.txt

  tests:
    name: ${{ matrix.suite }}
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        suite:
          - vllm-spec-decode
          - vllm-mrv2
          - vllm-moe
          - vllm-triton-attn
          - vllm-mamba
          - vllm-quant
          - vllm-rest
    runs-on:
      - linux
      - ${{ inputs.runner_label || 'max1550' }}
    timeout-minutes: 120
    defaults:
      run:
        shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Load pip cache
        id: pip-cache
        uses: ./.github/actions/load
        with:
          path: $HOME/.cache/pip
          key: pip-${{ inputs.python_version }}-${{ matrix.suite }}-${{ hashFiles('pyproject.toml', 'setup.py') }}-${{ env.PIP_CACHE_NUMBER }}

      - name: Download Triton wheel
        uses: actions/download-artifact@v8
        with:
          name: triton-vllm-${{ inputs.python_version }}
          path: dist/

      - name: Download vLLM requirements
        uses: actions/download-artifact@v8
        with:
          name: vllm-requirements-${{ inputs.python_version }}
          path: .

      - name: Install Python
        uses: ./.github/actions/setup-python
        with:
          python_version: ${{ inputs.python_version }}
          use_pyenv: ${{ inputs.use_pyenv_python }}

      - name: Identify Python version
        run: |
          PYTHON_VERSION="$(python -c 'import sys; print(f"{sys.version_info[0]}.{ sys.version_info[1]}")')"
          echo "PYTHON_VERSION=$PYTHON_VERSION" | tee -a $GITHUB_ENV

      - name: Install Python build dependencies
        run: |
          pip install cmake

      - name: Setup PyTorch
        uses: ./.github/actions/setup-pytorch

      - name: Install Triton from wheel
        id: install
        run: |
          pip install dist/*.whl
          python -c 'import triton; print(triton.__version__)'

      - name: Install test dependencies
        run: |
          pip install -r scripts/requirements-test.txt

      - name: Set test-triton command line
        run: |
          echo "TRITON_TEST_CMD=${{ needs.setup.outputs.test-triton-command }}" | tee -a $GITHUB_ENV

      - name: Install vLLM from frozen requirements
        if: ${{ steps.install.outcome == 'success' && !cancelled() }}
        run: |
          if [ -f vllm-requirements.txt ]; then
            pip install -r vllm-requirements.txt
            python -c 'import vllm; print(f"vLLM version: {getattr(vllm, \"__version__\", \"installed\")}")'
          else
            echo "Error: vLLM requirements not found"
            exit 1
          fi

      - name: Create reports dir
        run: |
          mkdir -p reports

      - name: Run spec-decode tests
        if: ${{ matrix.suite == 'vllm-spec-decode' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-spec-decode

      - name: Run mrv2 tests
        if: ${{ matrix.suite == 'vllm-mrv2' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-mrv2

      - name: Run moe tests
        if: ${{ matrix.suite == 'vllm-moe' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-moe

      - name: Run triton-attn tests
        if: ${{ matrix.suite == 'vllm-triton-attn' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-triton-attn

      - name: Run mamba tests
        if: ${{ matrix.suite == 'vllm-mamba' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-mamba

      - name: Run quant tests
        if: ${{ matrix.suite == 'vllm-quant' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-quant

      # vllm-rest groups short suites: gdn-attn, linear-attn, deepgemm
      - name: Run gdn-attn tests
        if: ${{ matrix.suite == 'vllm-rest' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-gdn-attn

      - name: Run linear-attn tests
        if: ${{ matrix.suite == 'vllm-rest' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-linear-attn

      - name: Run deepgemm tests
        if: ${{ matrix.suite == 'vllm-rest' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-deepgemm

      - name: Save pip cache
        if: ${{ steps.pip-cache.outputs.status == 'miss' }}
        uses: ./.github/actions/save
        with:
          path: ${{ steps.pip-cache.outputs.path }}
          dest: ${{ steps.pip-cache.outputs.dest }}

      - name: Upload test report
        if: ${{ steps.install.outcome == 'success' && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.suite }}
          path: reports
