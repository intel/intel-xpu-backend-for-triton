name: vLLM tests reusable workflow

on:
  workflow_call:
    inputs:
      suite:
        description: >
          Test suite: vllm-spec-decode, vllm-mrv2, vllm-moe, vllm-triton-attn,
          vllm-mamba, vllm-quant, or vllm-rest (groups: gdn-attn, linear-attn, deepgemm).
        type: string
        required: true
      runner_label:
        description: Runner label, keep empty for default
        type: string
        default: ""
      skip_list:
        description: Skip list directory override
        type: string
        default: ""
      python_version:
        description: Python version
        type: string
        default: "3.12"
      ignore_errors:
        description: Ignore test errors
        type: boolean
        default: false

permissions: read-all

env:
  PYTHON_VERSION: ${{ inputs.python_version }}

jobs:
  tests:
    name: ${{ inputs.suite }}
    runs-on:
      - linux
      - ${{ inputs.runner_label || 'max1550' }}
    timeout-minutes: 120
    defaults:
      run:
        shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
    steps:
      - name: Print inputs
        run: |
          cat <<EOF
          ${{ toJSON(inputs) }}
          EOF

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Python (from pyenv) ${{ inputs.python_version }}
        uses: ./.github/actions/setup-pyenv-python
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Identify Python version
        run: |
          PYTHON_VERSION="$(python -c 'import sys; print(f"{sys.version_info[0]}.{ sys.version_info[1]}")')"
          echo "PYTHON_VERSION=$PYTHON_VERSION" | tee -a $GITHUB_ENV

      - name: Install Python build dependencies
        run: |
          pip install cmake

      - name: Setup PyTorch
        uses: ./.github/actions/setup-pytorch

      - name: Setup Triton
        id: install
        uses: ./.github/actions/setup-triton

      - name: Install test dependencies
        run: |
          pip install -r scripts/requirements-test.txt

      - name: Set test-triton command line
        run: |
          skiplist="$GITHUB_WORKSPACE/scripts/skiplist/default"
          if [[ -n "${{ inputs.skip_list }}" ]]; then
            skiplist="$GITHUB_WORKSPACE/scripts/skiplist/${{ inputs.skip_list }}"
          fi
          TRITON_TEST_CMD="bash -x scripts/test-triton.sh --skip-pip-install --skip-pytorch-install --reports-dir $GITHUB_WORKSPACE/reports --skip-list $skiplist ${{ inputs.ignore_errors && '--ignore-errors' || '' }}"
          echo "TRITON_TEST_CMD=$TRITON_TEST_CMD" | tee -a $GITHUB_ENV

      - name: Create reports dir
        run: |
          mkdir -p reports

      - name: Install vLLM
        if: ${{ steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --install-vllm

      - name: Run spec-decode tests
        if: ${{ inputs.suite == 'vllm-spec-decode' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-spec-decode

      - name: Run mrv2 tests
        if: ${{ inputs.suite == 'vllm-mrv2' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-mrv2

      - name: Run moe tests
        if: ${{ inputs.suite == 'vllm-moe' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-moe

      - name: Run triton-attn tests
        if: ${{ inputs.suite == 'vllm-triton-attn' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-triton-attn

      - name: Run mamba tests
        if: ${{ inputs.suite == 'vllm-mamba' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-mamba

      - name: Run quant tests
        if: ${{ inputs.suite == 'vllm-quant' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-quant

      # vllm-rest groups short suites: gdn-attn, linear-attn, deepgemm
      - name: Run gdn-attn tests
        if: ${{ inputs.suite == 'vllm-rest' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-gdn-attn

      - name: Run linear-attn tests
        if: ${{ inputs.suite == 'vllm-rest' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-linear-attn

      - name: Run deepgemm tests
        if: ${{ inputs.suite == 'vllm-rest' && steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ${{ env.TRITON_TEST_CMD }} --vllm-deepgemm

      - name: Upload test report
        if: ${{ steps.install.outcome == 'success' && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ inputs.suite }}
          path: reports
