name: vLLM tests reusable workflow

on:
  workflow_call:
    inputs:
      suite:
        description: "Test suite: vllm, vllm-spec-decode, or vllm-mrv2"
        type: string
        required: true
      runner_label:
        description: Runner label, keep empty for default
        type: string
        default: ""
      skip_list:
        description: Skip list directory override
        type: string
        default: ""
      python_version:
        description: Python version
        type: string
        default: "3.12"
      ignore_errors:
        description: Ignore test errors
        type: boolean
        default: false

permissions: read-all

env:
  PYTHON_VERSION: ${{ inputs.python_version }}

jobs:
  run-tests:
    name: ${{ inputs.suite }}
    runs-on:
      - linux
      - ${{ inputs.runner_label || 'max1550' }}
    timeout-minutes: 120
    defaults:
      run:
        shell: bash -noprofile --norc -eo pipefail -c "source /opt/intel/oneapi/setvars.sh > /dev/null; source {0}"
    steps:
      - name: Print inputs
        run: |
          cat <<EOF
          ${{ toJSON(inputs) }}
          EOF

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Python (from pyenv) ${{ inputs.python_version }}
        uses: ./.github/actions/setup-pyenv-python
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Identify Python version
        run: |
          PYTHON_VERSION="$(python -c 'import sys; print(f"{sys.version_info[0]}.{ sys.version_info[1]}")')"
          echo "PYTHON_VERSION=$PYTHON_VERSION" | tee -a $GITHUB_ENV

      - name: Install Python build dependencies
        run: |
          pip install cmake

      - name: Setup PyTorch
        uses: ./.github/actions/setup-pytorch

      - name: Setup Triton
        id: install
        uses: ./.github/actions/setup-triton

      - name: Configure skip list
        run: |
          skiplist="$GITHUB_WORKSPACE/scripts/skiplist/default"
          if [[ -n "${{ inputs.skip_list }}" ]]; then
            skiplist="$GITHUB_WORKSPACE/scripts/skiplist/${{ inputs.skip_list }}"
          fi
          echo "SKIPLIST=$skiplist" >> $GITHUB_ENV

      - name: Create reports dir
        run: |
          mkdir -p reports
          echo "REPORTS=$PWD/reports" >> $GITHUB_ENV

      - name: Run ${{ inputs.suite }} tests
        if: ${{ steps.install.outcome == 'success' && !cancelled() }}
        run: |
          ./scripts/test-triton.sh \
            --${{ inputs.suite }} \
            --skip-pip-install \
            --skip-pytorch-install \
            --reports-dir $GITHUB_WORKSPACE/reports \
            --skip-list ${{ env.SKIPLIST }} \
            ${{ inputs.ignore_errors && '--ignore-errors' || '' }}

      - name: Upload test report
        if: ${{ steps.install.outcome == 'success' && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-${{ inputs.suite }}-reports
          path: reports
