name: Nightly merge main-interim into main-cri
run-name: Nightly merge main-interim into main-cri

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *' # Every day at 9:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  do-merge:
    if: ${{ github.ref == 'refs/heads/main-interim' }}
    name: Do the merge
    runs-on:
      - cri
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout main-cri branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main-cri
          token: ${{ secrets.GLADOS_TOKEN }}

      - name: Do merge in a new branch and create PR
        env:
          GH_TOKEN: ${{ secrets.GLADOS_TOKEN }}
        run: |
          set -xe

          # Check for existing open PR with the title prefix
          EXISTING_PR=$(gh pr list --repo intel-tools/intel-xpu-backend-for-triton --state open --json number,title --jq '.[] | select(.title | startswith("[CRI] AUTOMERGE main-interim into main-cri")) | .number')
          if [ -n "$EXISTING_PR" ]; then
            echo "A merge PR already exists: #$EXISTING_PR. Skipping PR creation."
            exit 0
          fi

          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BRANCH_NAME=merge-main-interim-${TIMESTAMP}

          git config user.name "GlaDOS"
          git config user.email "glados@intel.com"
          git config merge.ours.driver true

          git checkout -b "${BRANCH_NAME}" main-cri
          git fetch origin main-interim:main-interim
          TOP_COMMIT=$(git rev-parse origin/main-interim)
          SHORT_COMMIT=$(git rev-parse --short origin/main-interim)
          git merge --verbose --commit --no-edit -m "Merge commit '${TOP_COMMIT}'" --no-ff --no-squash --stat ${TOP_COMMIT}
          git push origin "${BRANCH_NAME}"

          gh pr create \
            --repo intel-tools/intel-xpu-backend-for-triton \
            --title "[CRI] AUTOMERGE main-interim into main-cri commit ${SHORT_COMMIT}" \
            --body "Automated merge of main-interim into main-cri. Do not squash!" \
            --reviewer gshimansky,whitneywhtsang \
            --base main-cri \
            --head "${BRANCH_NAME}"

          gh api repos/intel-tools/intel-xpu-backend-for-triton -X PATCH -f allow_merge_commit=true
          gh pr merge --repo intel-tools/intel-xpu-backend-for-triton --merge --auto "${BRANCH_NAME}"
          gh api repos/intel-tools/intel-xpu-backend-for-triton -X PATCH -f allow_merge_commit=false
