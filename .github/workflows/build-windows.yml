name: Build on Windows

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
      - release/**
  push:
    branches:
      - main
      - release/**

permissions: read-all

env:
  NEW_WORKSPACE: C:\gh${{ github.run_id }}

jobs:
  build:
    name: Build
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: amd64

      - name: Clean up old workspaces
        shell: bash
        run: |
          rm -rf /c/gh*

      # Copy workspace to a temporary location with a shorter name.
      - name: Copy workspace
        run: |
          Copy-Item -Path ${{ github.workspace }} -Destination ${{ env.NEW_WORKSPACE }} -Recurse

      - name: Create venv
        run:
          python -m venv .venv

      - name: Setup Triton
        run: |
          .venv\Scripts\activate.ps1
          cd ${{ env.NEW_WORKSPACE }}
          pip install -U pybind11 cmake
          pip install -v '.[build]'

      - name: Clean
        if: ${{ always() }}
        run: |
          Remove-Item -LiteralPath ${{ env.NEW_WORKSPACE }} -Force -Recurse -ErrorAction Ignore
