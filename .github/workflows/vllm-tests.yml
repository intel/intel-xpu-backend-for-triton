name: vLLM tests

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Runner label, keep empty for default
        type: string
        default: ""
      suites:
        description: >
          JSON list of suites to run, e.g. ["vllm","vllm-spec-decode","vllm-mrv2"].
          Leave empty to run all.
        type: string
        default: '["vllm","vllm-spec-decode","vllm-mrv2","vllm-moe","vllm-triton-attn","vllm-gdn-attn","vllm-mamba","vllm-quant","vllm-linear-attn"]'
  schedule:
    # About midnight PST Sunday (UTC-8)
    - cron: "5 10 * * SUN"

# Cancels in-progress PR runs when the PR is updated.  Manual runs are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  vllm-tests:
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(inputs.suites || '["vllm","vllm-spec-decode","vllm-mrv2","vllm-moe","vllm-triton-attn","vllm-gdn-attn","vllm-mamba","vllm-quant","vllm-linear-attn"]') }}
    uses: ./.github/workflows/vllm-tests-reusable.yml
    with:
      suite: ${{ matrix.suite }}
      runner_label: ${{ inputs.runner_label || '' }}
