name: vLLM tests
run-name: ${{ inputs.run_name }}

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Runner label, keep empty for default
        type: string
        default: ""
      vllm_pin:
        description: vLLM pin (commit hash), keep empty for default
        type: string
        default: ""
      skip_list:
        description: Skip list
        type: string
        default: ""
      run_name:
        description: Custom run name
        type: string
        default: "vLLM tests"
      ignore_errors:
        description: Ignore test errors
        type: boolean
        default: false
      use_pyenv_python:
        description: Use Python built with pyenv
        type: boolean
        default: false

  schedule:
    # Thursday/Sunday 2:05AM PST (UTC-8) or 3:05AM PDT (UTC-7)
    - cron: "5 10 * * THU"
    - cron: "5 10 * * SUN"

# Cancel in-progress scheduled runs. Manual runs are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'ci' }}
  cancel-in-progress: true

permissions: read-all

jobs:
  vllm-tests:
    uses: ./.github/workflows/vllm-tests-reusable.yml
    with:
      runner_label: ${{ inputs.runner_label || '' }}
      vllm_pin: ${{ inputs.vllm_pin || '' }}
      python_version: "3.12"
      skip_list: ${{ inputs.skip_list || '' }}
      ignore_errors: ${{ inputs.ignore_errors || false }}
      use_pyenv_python: ${{ inputs.use_pyenv_python || true }}
