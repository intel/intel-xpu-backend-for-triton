name: vLLM tests

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Runner label, keep empty for default
        type: string
        default: ""
      skip_list:
        description: Skip list directory override
        type: string
        default: ""
      ignore_errors:
        description: Ignore test errors
        type: boolean
        default: false
  schedule:
    # About midnight PST Sunday (UTC-8)
    - cron: "5 10 * * SUN"

# Cancels in-progress PR runs when the PR is updated.  Manual runs are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  vllm-tests:
    uses: ./.github/workflows/vllm-tests-reusable.yml
    with:
      runner_label: ${{ inputs.runner_label || '' }}
      python_version: "3.12"
      skip_list: ${{ inputs.skip_list || '' }}
      ignore_errors: ${{ inputs.ignore_errors || false }}

  # TODO: After PR #6360 is merged, replace this inline reports job with:
  #   uses: ./.github/workflows/reports-reusable.yml
  reports:
    name: Reports
    runs-on:
      - runner-0.0.22
    if: always()
    needs: vllm-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: ./.github/actions/setup-python
        with:
          python_version: "3.10"
          use_pyenv: true

      - name: Install triton_utils
        run: |
          pip install ./scripts/triton_utils

      - name: Download test reports
        uses: actions/download-artifact@v8
        with:
          pattern: test-reports-vllm-*
          path: reports
          merge-multiple: true

      - name: Pass rate
        run: |
          triton-utils pass_rate --reports reports --save-to-json pass_rate.json --merge-test-results --tests-with-multiple-testsuites

      - name: Stats by testsuite (sorted by name)
        run: |
          triton-utils stats --reports reports --level testsuite --pretty --merge --long-names --multiple-suites

      - name: Stats by testsuite (sorted by skipped)
        run: |
          triton-utils stats --reports reports --level testsuite --pretty --merge --long-names --multiple-suites --sort-by skipped

      - name: Stats by testsuite (sorted by time)
        run: |
          triton-utils stats --reports reports --level testsuite --pretty --merge --long-names --multiple-suites --sort-by time

      - name: Stats by test (sorted by name)
        run: |
          triton-utils stats --reports reports --level test --pretty --merge --long-names --multiple-suites

      - name: Stats by test (sorted by skipped)
        run: |
          triton-utils stats --reports reports --level test --pretty --merge --long-names --multiple-suites --sort-by skipped

      - name: Stats by test (sorted by time)
        run: |
          triton-utils stats --reports reports --level test --pretty --merge --long-names --multiple-suites --sort-by time

      - name: Upload pass rate report
        uses: actions/upload-artifact@v7
        with:
          name: pass_rate-vllm
          path: pass_rate*.json
