name: TritonXPU-GTA
version: 3.6.0-20260107
initialize_by_default: false
batch_mode: true

installer_type: sh
installer_filename: TritonXPU-GTA.sh

build_outputs:
  - hash:
      algorithm: sha256

channels:
  - conda-forge

condarc:
  channels:
  - conda-forge
  solver: libmamba

specs:
  - python=3.10
  - conda
  - pip

default_prefix: ${HOME}/triton-xpu

extra_files:
  - ../../../wheels.tar.gz
  - ../../../intel-deep-learning-essentials_offline.sh
  - ../../../snapshot.tar.gz
  - ../../../vulkan-sdk.tar.xz

post_install: install_wheels.sh # [unix]
